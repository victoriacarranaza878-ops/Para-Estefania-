<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para mi Estefisita ❤️</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background: linear-gradient(135deg,#f7f7f7,#e8e8e8);
    min-height:100vh;
    overflow-y:auto;
    text-align:center;
    padding:20px;
}

.container{
    max-width:700px;
    margin:auto;
}

.card{
    background:white;
    border-radius:25px;
    padding:30px;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
    margin-top:20px;
}

.envelope{
    font-size:120px;
    animation:bounce 2s infinite;
}

h1,h2{
    color:#555;
}

.message{
    margin-top:20px;
    line-height:1.8;
    color:#444;
    font-size:18px;
}

button{
    margin-top:20px;
    background:#ff7da8;
    color:white;
    border:none;
    padding:15px 25px;
    border-radius:15px;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.05);
}

#letter{
    display:none;
}

#catSection{
    display:none;
    margin-top:30px;
}

.cat{
    font-size:80px;
    animation:float 2s ease-in-out infinite;
}

#kissSection{
    display:none;
    margin-top:20px;
}

#kissResult{
    margin-top:15px;
    font-size:22px;
    color:#ff4d88;
    font-weight:bold;
}

.heart{
    position:fixed;
    bottom:-50px;
    animation:rise linear infinite;
    opacity:.5;
    pointer-events:none;
}

@keyframes bounce{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-8px);}
}

@keyframes rise{
    from{
        transform:translateY(0);
        opacity:0;
    }
    20%{
        opacity:.5;
    }
    to{
        transform:translateY(-120vh);
        opacity:0;
    }
}

</style>
</head>
<body>

<div class="container">

    <div class="card" id="start">

        <div class="envelope">💌</div>

        <h1>
            Tienes un mensaje especial de alguien que te ama mucho ❤️
        </h1>

        <button onclick="openLetter()">
            Abrir sobre
        </button>

    </div>

    <div class="card" id="letter">

        <h2>
            Para mi Estefisita hermocha 😍🩶
        </h2>

        <div class="message">

            Feliz un año y dos meses juntos, mi Estefisita hermocha 😍🩶

            <br><br>

            Todo este tiempo
